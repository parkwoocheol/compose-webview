name: Build

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]


jobs:
  # Fast quality checks for PR feedback
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Check Code Style (Spotless)
        run: ./gradlew spotlessCheck

      - name: Android Lint
        run: ./gradlew lintDebug

  docs:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Validate Docs
        run: bash .agents/skills/documentation/scripts/validate_docs.sh

      - name: Build Docs (Strict)
        run: bash .agents/skills/documentation/scripts/mkdocs_build.sh

  # Build and test Android, Desktop, Web (Ubuntu)
  build-common:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android
        run: ./gradlew :compose-webview:assembleDebug

      - name: Test Android
        run: ./gradlew :compose-webview:testDebugUnitTest

      - name: Build Desktop
        run: ./gradlew :compose-webview:compileKotlinDesktop

      - name: Build Web (JS)
        run: ./gradlew :compose-webview:compileKotlinJs

      - name: Build WASM
        run: ./gradlew :compose-webview:compileKotlinWasmJs

  android-instrumented:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Android Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          script: ./gradlew :compose-webview:connectedDebugAndroidTest

  # Build and test iOS (macOS)
  build-ios:
    needs: quality
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build iOS Framework
        run: ./gradlew :compose-webview:linkIosSimulatorArm64

      - name: Test iOS
        run: ./gradlew :compose-webview:iosSimulatorArm64Test
